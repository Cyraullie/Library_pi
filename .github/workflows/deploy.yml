name: Deploy on Release

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Raspberry Pi
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin main
            npm install
            npm run build

            # Lancer ou redémarrer l'app avec PM2
            pm2 start npm --name "LibPi" -- run prod --interpreter bash || pm2 restart LibPi
            # Sauvegarder la configuration PM2 pour redémarrage automatique au boot

            # Lancer ngrok
            pm2 start ./start-ngrok.sh --name "ngrok-tunnel" || pm2 restart ngrok-tunnel
            pm2 save
          EOF